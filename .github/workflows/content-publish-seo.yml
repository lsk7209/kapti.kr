name: Content publish SEO automation

on:
  push:
    branches:
      - main
    paths:
      - "app/blog/**"
      - "lib/posts.ts"
      - "app/sitemap.ts"
      - "app/robots.ts"
      - "public/**"
      - "scripts/seo/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

jobs:
  submit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build

      - name: Check SEO secrets
        id: check_secrets
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN }}
        run: |
          echo "has_site_url=$([ -n "$SITE_URL" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_indexnow_key=$([ -n "$INDEXNOW_KEY" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_gsc_json=$([ -n "$GSC_SERVICE_ACCOUNT_JSON" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_site_domain=$([ -n "$SITE_DOMAIN" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Validate production SEO environment
        if: steps.check_secrets.outputs.has_site_url == 'true'
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          GSC_OWNER_EMAIL: ${{ secrets.GSC_OWNER_EMAIL }}
        run: node scripts/seo/validate-env.mjs --require-production

      - name: Generate IndexNow key file
        if: steps.check_secrets.outputs.has_indexnow_key == 'true'
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: node scripts/seo/generate-indexnow-key-file.mjs

      - name: Submit sitemap to Google Search Console
        if: steps.check_secrets.outputs.has_gsc_json == 'true' && steps.check_secrets.outputs.has_site_url == 'true'
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          SITE_URL: ${{ secrets.SITE_URL }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          SITEMAP_URL: ${{ secrets.SITEMAP_URL }}
        run: node scripts/seo/submit-gsc-sitemap.mjs --execute

      - name: Submit changed URLs to IndexNow
        if: steps.check_secrets.outputs.has_indexnow_key == 'true' && steps.check_secrets.outputs.has_site_url == 'true' && steps.check_secrets.outputs.has_site_domain == 'true'
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN }}
        run: node scripts/seo/indexnow-submit.mjs --execute

      - name: Skip notice
        if: steps.check_secrets.outputs.has_gsc_json == 'false' || steps.check_secrets.outputs.has_indexnow_key == 'false' || steps.check_secrets.outputs.has_site_url == 'false'
        run: echo "SEO submission skipped for missing secrets. Local dry-run scripts remain available."
