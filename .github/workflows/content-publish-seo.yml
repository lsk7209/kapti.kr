name: Content publish SEO automation

on:
  push:
    branches:
      - main
    paths:
      - "app/blog/**"
      - "lib/posts.ts"
      - "app/sitemap.ts"
      - "app/robots.ts"
      - "public/**"
      - "scripts/seo/**"
      - "package.json"
      - "package-lock.json"

jobs:
  submit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build

      - name: Validate production SEO environment
        if: ${{ secrets.SITE_URL != '' }}
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          GSC_OWNER_EMAIL: ${{ secrets.GSC_OWNER_EMAIL }}
        run: node scripts/seo/validate-env.mjs --require-production

      - name: Generate IndexNow key file
        if: ${{ secrets.INDEXNOW_KEY != '' }}
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: node scripts/seo/generate-indexnow-key-file.mjs

      - name: Submit sitemap to Google Search Console
        if: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON != '' && secrets.SITE_URL != '' }}
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          SITE_URL: ${{ secrets.SITE_URL }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          SITEMAP_URL: ${{ secrets.SITEMAP_URL }}
        run: node scripts/seo/submit-gsc-sitemap.mjs --execute

      - name: Submit changed URLs to IndexNow
        if: ${{ secrets.INDEXNOW_KEY != '' && secrets.SITE_URL != '' && secrets.SITE_DOMAIN != '' }}
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN }}
        run: node scripts/seo/indexnow-submit.mjs --execute

      - name: Skip notice
        if: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON == '' || secrets.INDEXNOW_KEY == '' || secrets.SITE_URL == '' }}
        run: echo "SEO submission skipped for missing secrets. Local dry-run scripts remain available."
